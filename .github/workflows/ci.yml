name: WiFi Guard CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci || npm install

    - name: 🔍 Syntax Validation & Check
      run: |
        node --check src/index.js
        node --check src/scanner/network-scanner.js
        node --check src/scanner/device-identifier.js
        node --check src/alert/alert-engine.js
        node --check src/database/db.js
        node --check src/dashboard/server.js
